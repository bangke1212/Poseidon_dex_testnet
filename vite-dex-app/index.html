<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/poseidon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Poseidon DEX — Multi-chain Swap</title>
    <style>
      @keyframes waveSlowMotion {
        0%, 100% { transform: scale(1) translate(0px, 0px); }
        25% { transform: scale(1.04) translate(6px, -8px); }
        50% { transform: scale(1) translate(10px, 2px); }
        75% { transform: scale(1.03) translate(4px, -4px); }
      }
      .animate-wave-slow {
        animation: waveSlowMotion 14s ease-in-out infinite;
        will-change: transform;
      }
    </style>
  </head>

    <div id="root"></div>
